<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT Login - Somnia Testnet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; margin: 0; }
        .card { background: #2d2d2d; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 1px solid #444; }
        h2 { color: #ffad00; margin-bottom: 10px; }
        button { background: linear-gradient(45deg, #ff8c00, #ff4500); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4); }
        #status { margin-top: 20px; font-size: 0.9rem; color: #aaa; word-break: break-all; }
        #balance { margin-top: 10px; font-size: 1.2rem; color: #00ffcc; }
    </style>
</head>
<body>

<div class="card">
    <h2>CAT Community 🐱</h2>
    <p>Chào mừng bạn đến với hệ sinh thái CAT</p>
    <button id="connectBtn">Kết nối & Đăng nhập</button>
    <div id="status">Chưa kết nối ví</div>
    <div id="balance"></div>
</div>

<script>
    const SOMNIA_PARAMS = {
        chainId: '0xC488', // 50312 ở dạng Hex
        chainName: 'Somnia Testnet',
        nativeCurrency: { name: 'STT', symbol: 'STT', decimals: 18 },
        rpcUrls: ['https://rpc.testnet.somnia.network'],
        blockExplorerUrls: ['https://explorer-testnet.somnia.network/']
    };

    const CAT_CONTRACT = "0xE0910db49AFBE915Dc2E0Ec27edE5BBdc7C2a8dd";
    const ABI = ["function balanceOf(address) view returns (uint256)", "function symbol() view returns (string)"];

    async function switchNetwork() {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: SOMNIA_PARAMS.chainId }],
            });
        } catch (error) {
            // Nếu mạng chưa có trong ví, yêu cầu thêm mạng mới
            if (error.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [SOMNIA_PARAMS],
                });
            }
        }
    }

    async function login() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                // 1. Chuyển mạng trước
                await switchNetwork();
                
                // 2. Kết nối ví
                const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];
                document.getElementById('status').innerText = `Địa chỉ: ${userAddress.substring(0,6)}...${userAddress.substring(38)}`;

                // 3. Kiểm tra số dư CAT
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(CAT_CONTRACT, ABI, provider);
                const balance = await contract.balanceOf(userAddress);
                const symbol = await contract.symbol();
                
                document.getElementById('balance').innerHTML = `Số dư: <b>${ethers.utils.formatUnits(balance, 18)} ${symbol}</b>`;
                document.getElementById('connectBtn').innerText = "Đã đăng nhập thành công";
            } catch (err) {
                console.error(err);
                alert("Có lỗi xảy ra khi kết nối!");
            }
        } else {
            alert("Vui lòng cài đặt MetaMask!");
        }
    }

    document.getElementById('connectBtn').addEventListener('click', login);
</script>

</body>
</html>
